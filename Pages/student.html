<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة الطالب</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background-color: #f4f6f9;
      direction: rtl;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #004080;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .welcome {
      display: block;
      margin-top: 10px;
      font-size: 1.4em;
      font-weight: bold;
      color: #ffcc00;
      text-shadow: 1px 1px 3px #333;
    }
    section {
      margin: 30px auto;
      width: 90%;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      color: #004080;
      border-bottom: 2px solid #004080;
      padding-bottom: 5px;
      text-align: center;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #004080;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1><i class="fas fa-user-graduate"></i> لوحة الطالب</h1>
</header>

<section id="studentInfo">
  <h2>بيانات الطالب</h2>
  <div id="info"></div>
</section>

<script>
async function loadStudent() {
  // قراءة الرقم من الرابط
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  try {
    const response = await fetch("../data.json"); // الملف في الجذر
    const data = await response.json();

    if (data.students[id]) {
      const student = data.students[id];

      // عرض الترحيب بالاسم
      document.querySelector("header h1").innerHTML =
        "<i class='fas fa-user-graduate'></i> لوحة الطالب <br><span class='welcome'>👤 مرحباً " + student.name + "</span>";

      // عرض بيانات الطالب في جدول
      let table = "<table>";
      table += "<tr><th>الرقم الشخصي</th><td>" + id + "</td></tr>";
      table += "<tr><th>الاسم</th><td>" + student.name + "</td></tr>";
      table += "<tr><th>الصف</th><td>" + student.class + "</td></tr>";
      table += "<tr><th>الحصص</th><td>" + student.lessons.join(", ") + "</td></tr>";
      table += "</table>";

      document.getElementById("info").innerHTML = table;
    } else {
      document.getElementById("info").innerHTML = "⚠️ الرقم غير موجود في النظام.";
    }
  } catch (error) {
    document.getElementById("info").innerHTML = "⚠️ خطأ في تحميل البيانات.";
  }
}

loadStudent();
</script>

</body>
</html>
