<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة المعلم</title>
</head>
<body>
  <h2>لوحة المعلم</h2>
  <div id="studentsTable"></div>

  <script>
    async function loadStudents() {
      try {
        const response = await fetch("../data.json"); // الملف في الجذر
        const data = await response.json();

        let table = "<table border='1' style='border-collapse:collapse; text-align:center;'>";
        table += "<tr><th>الرقم</th><th>الاسم</th><th>الصف</th><th>الحصص</th></tr>";

        for (const id in data.students) {
          const student = data.students[id];
          table += `<tr>
                      <td>${id}</td>
                      <td>${student.name}</td>
                      <td>${student.class}</td>
                      <td>${student.lessons.join(", ")}</td>
                    </tr>`;
        }

        table += "</table>";
        document.getElementById("studentsTable").innerHTML = table;
      } catch (error) {
        document.getElementById("studentsTable").innerHTML = "⚠️ خطأ في تحميل بيانات الطلاب.";
      }
    }

    loadStudents();
  </script>
</body>
</html>
