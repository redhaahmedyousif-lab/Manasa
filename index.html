      text-align: center;

    .pe { background-color: #f2f2f2; color:#333; }

    #summaries ul, #dailySummary ul { list-style: none; padding: 0; }

    #lessons a:hover { color: #ff6600; }

      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

      background-color: #ffcc00;
      color: #004080;
    }
